experiment:
  name: unet_v5_5m_mse_lrs

data:
  root: "E:/PycharmProjects/SnowPrediction/Articulo 1/Data/processed/dataset_v5_5m"
  csv_file: "dataset_v4_fisico.csv"
  images_dir: "images"
  masks_dir: "masks"
  source: "lidar"
  split_type: "temporal"
  use_sce: false
  augmentation: false

model:
  architecture: "unet"
  in_channels: 5
  out_channels: 1

training:
  batch_size: 8
  learning_rate: 0.0001
  epochs: 150
  loss: "mse"
  lr_scheduler: true        # ReduceLROnPlateau monitoreado en val_loss
  lr_factor: 0.5            # reduce LR a la mitad
  lr_patience: 15           # espera 15 epocas sin mejora
  lr_min: 0.000001          # LR minimo
  num_workers: 0
  device: "auto"

output:
  models_dir: "E:/PycharmProjects/SnowPrediction/Articulo 1/Models"
  results_dir: "E:/PycharmProjects/SnowPrediction/results/unet_v5_5m_mse_lrs"
  model_name: "unet_v5_5m_mse_lrs"
