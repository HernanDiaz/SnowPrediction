experiment:
  name: unet_v5_5m_mse_wd_all_train

data:
  root: "E:/PycharmProjects/SnowPrediction/Articulo 1/Data/processed/dataset_v5_5m"
  csv_file: "dataset_v4_fisico.csv"
  images_dir: "images"
  masks_dir: "masks"
  source: "lidar"
  split_type: "temporal"
  use_sce: false
  augmentation: false
  use_all_pretest: true   # Entrenar con 2021+2022+2023 (71 tiles vs 54 normales)

model:
  architecture: "unet"
  in_channels: 5
  out_channels: 1

training:
  batch_size: 8
  learning_rate: 0.0001
  epochs: 150
  loss: "mse"
  num_workers: 0
  device: "auto"
  weight_decay: 0.0001
  early_stopping: false   # Sin early stopping: guardar el ultimo checkpoint (ep150)

output:
  models_dir: "E:/PycharmProjects/SnowPrediction/Articulo 1/Models"
  results_dir: "E:/PycharmProjects/SnowPrediction/results/unet_v5_5m_mse_wd_all_train"
  model_name: "unet_v5_5m_mse_wd_all_train"
