experiment:
  name: unet_v5_5m_mse_wd_swa

data:
  root: "E:/PycharmProjects/SnowPrediction/Articulo 1/Data/processed/dataset_v5_5m"
  csv_file: "dataset_v4_fisico.csv"
  images_dir: "images"
  masks_dir: "masks"
  source: "lidar"
  split_type: "temporal"
  use_sce: false
  augmentation: false

model:
  architecture: "unet"
  in_channels: 5
  out_channels: 1

training:
  batch_size: 8
  learning_rate: 0.0001
  epochs: 150
  loss: "mse"
  num_workers: 0
  device: "auto"
  weight_decay: 0.0001
  swa: true            # Stochastic Weight Averaging
  swa_start: 75        # Inicio del SWA a la mitad del entrenamiento
  swa_lr: 0.00001      # LR fijo durante la fase SWA

output:
  models_dir: "E:/PycharmProjects/SnowPrediction/Articulo 1/Models"
  results_dir: "E:/PycharmProjects/SnowPrediction/results/unet_v5_5m_mse_wd_swa"
  model_name: "unet_v5_5m_mse_wd_swa"
