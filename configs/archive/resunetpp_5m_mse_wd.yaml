experiment:
  name: resunetpp_5m_mse_wd

data:
  root: "E:/PycharmProjects/SnowPrediction/Articulo 1/Data/processed/dataset_v5_5m"
  csv_file: "dataset_v4_fisico.csv"
  images_dir: "images"
  masks_dir: "masks"
  source: "lidar"
  split_type: "temporal"
  use_sce: false
  augmentation: false

model:
  architecture: "resunetpp"
  in_channels: 5
  out_channels: 1
  features: [32, 64, 128, 256]   # ~6.1M params (adecuado para 54 tiles)
  dropout_p: 0.0
  num_groups: 8

training:
  batch_size: 8
  learning_rate: 0.0001
  epochs: 150
  loss: "mse"
  weight_decay: 0.0001            # mismo WD optimo del mejor U-Net
  optimizer: "adam"
  num_workers: 0
  device: "auto"

output:
  models_dir: "E:/PycharmProjects/SnowPrediction/Articulo 1/Models"
  results_dir: "E:/PycharmProjects/SnowPrediction/results/resunetpp_5m_mse_wd"
  model_name: "resunetpp_5m_mse_wd"
