experiment:
  name: unet_v4_1m_mse_wd

data:
  root: "E:/PycharmProjects/SnowPrediction/dataset_v4_fisico"
  csv_file: "dataset_v4_fisico.csv"
  images_dir: "images"
  masks_dir: "masks"
  source: "lidar"
  split_type: "temporal"
  use_sce: false

model:
  architecture: "unet"
  in_channels: 5
  out_channels: 1

training:
  batch_size: 16
  learning_rate: 0.0001
  epochs: 150
  loss: "mse"
  num_workers: 0
  device: "auto"
  weight_decay: 0.0001   # Igual que el mejor modelo 5m (unet_v5_5m_mse_wd)

output:
  models_dir: "E:/PycharmProjects/SnowPrediction/Articulo 1/Models"
  results_dir: "E:/PycharmProjects/SnowPrediction/results/unet_v4_1m_mse_wd"
  model_name: "unet_v4_1m_mse_wd"
