experiment:
  name: resunetpp_v4_ms

# ResUNet++ con canales multi-escala (22 canales).
# Identico a resunetpp_v4_17ch salvo in_channels=22.
# Canales 0-16 : detalle 1m (igual que v4_17ch)
# Canales 17-21: contexto 5m (DEM, Slope, Northness, Eastness, TPI)
#
# Dataset : dataset_v4_ms (1m, 256x256, ~4241 tiles train)
# Split   : train=2021-2023, val=2024, test=2025

data:
  root: "dataset_v4_ms"
  csv_file: "dataset_v4_ms.csv"
  images_dir: "images"
  masks_dir: "masks"
  source: "lidar"
  split_type: "temporal"
  use_sce: false
  augmentation: true
  augmentation_mode: "h"

model:
  architecture: "resunetpp"
  in_channels: 22
  out_channels: 1
  features: [48, 96, 192, 384]
  dropout_p: 0.1
  num_groups: 8

training:
  batch_size: 8
  learning_rate: 0.00039
  epochs: 300
  loss: "mse"
  weight_decay: 1.6e-05
  optimizer: "adam"
  grad_clip: 0.0
  scheduler: "cosine"
  lr_min: 1.0e-6
  early_stopping: true
  es_patience: 20
  num_workers: 0
  device: "auto"

output:
  models_dir: "Articulo 1/Models"
  results_dir: "results/resunetpp_v4_ms"
  model_name: "resunetpp_v4_ms"
