experiment:
  name: resunetpp_v4_ms_sx200_sp10

# ResUNet++ v4-ms-Sx200 con loss espacial MSE + 1.0*(1-Pearson).
# Lambda alto: mayor enfasis en reproducir el patron espacial.
# Riesgo: puede sacrificar precision en magnitud para ganar en patron.

data:
  root: "dataset_v4_ms_sx200"
  csv_file: "dataset_v4_ms_sx200.csv"
  images_dir: "images"
  masks_dir: "masks"
  source: "lidar"
  split_type: "temporal"
  use_sce: false
  augmentation: true
  augmentation_mode: "h"

model:
  architecture: "resunetpp"
  in_channels: 22
  out_channels: 1
  features: [48, 96, 192, 384]
  dropout_p: 0.1
  num_groups: 8

training:
  seed: 42
  batch_size: 8
  learning_rate: 0.00039
  epochs: 300
  loss: "spatial_mse"
  lambda_pearson: 1.0
  weight_decay: 1.6e-05
  optimizer: "adam"
  grad_clip: 0.0
  scheduler: "cosine"
  lr_min: 1.0e-6
  early_stopping: true
  es_patience: 20
  num_workers: 0
  device: "auto"

output:
  models_dir: "Articulo 1/Models"
  results_dir: "results/resunetpp_v4_ms_sx200_sp10"
  model_name: "resunetpp_v4_ms_sx200_sp10"
