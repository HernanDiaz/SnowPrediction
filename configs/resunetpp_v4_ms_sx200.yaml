experiment:
  name: resunetpp_v4_ms_sx200

# ResUNet++ multi-escala (22ch) con Sx a radio 200m en escala fina 1m.
# Variante de v4_ms que reemplaza Sx_100m por Sx_200m en los canales 6-13.
# El radio 200m es el recomendado por el experto de dominio.
#
# Dataset : dataset_v4_ms_sx200 (1m, 22ch, Sx_200m en canales finos)
# Split   : train=2021-2023, val=2024, test=2025

data:
  root: "dataset_v4_ms_sx200"
  csv_file: "dataset_v4_ms_sx200.csv"
  images_dir: "images"
  masks_dir: "masks"
  source: "lidar"
  split_type: "temporal"
  use_sce: false
  augmentation: true
  augmentation_mode: "h"

model:
  architecture: "resunetpp"
  in_channels: 22
  out_channels: 1
  features: [48, 96, 192, 384]
  dropout_p: 0.1
  num_groups: 8

training:
  batch_size: 8
  learning_rate: 0.00039
  epochs: 300
  loss: "mse"
  weight_decay: 1.6e-05
  optimizer: "adam"
  grad_clip: 0.0
  scheduler: "cosine"
  lr_min: 1.0e-6
  early_stopping: true
  es_patience: 20
  num_workers: 0
  device: "auto"

output:
  models_dir: "Articulo 1/Models"
  results_dir: "results/resunetpp_v4_ms_sx200"
  model_name: "resunetpp_v4_ms_sx200"
