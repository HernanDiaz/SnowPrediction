experiment:
  name: unet_v4_1m_topo5

data:
  root: "dataset_v4_fisico"
  csv_file: "dataset_v4_fisico.csv"
  images_dir: "images"
  masks_dir: "masks"
  source: "lidar"
  split_type: "temporal"
  use_sce: false
  augmentation: true
  # Solo canales topograficos: DEM, Slope, Northness, Eastness, TPI
  channel_indices: [0, 1, 2, 3, 4]

model:
  architecture: "unet"
  in_channels: 5       # 5 topo (comparable a RF v5)
  out_channels: 1
  features: [64, 128, 256, 512]
  dropout_p: 0.1

training:
  batch_size: 16
  learning_rate: 0.001
  epochs: 150
  loss: "mse"
  weight_decay: 0.0001
  optimizer: "adamw"
  grad_clip: 1.0
  scheduler: "cosine"
  lr_min: 1.0e-6
  early_stopping: true
  num_workers: 0
  device: "auto"

output:
  models_dir: "Articulo 1/Models"
  results_dir: "results/unet_v4_1m_topo5"
  model_name: "unet_v4_1m_topo5"
